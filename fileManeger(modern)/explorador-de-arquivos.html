  /* ============ JANELA ============ */
  .window{
    width:min(1180px,100%);
    height:min(820px,calc(100vh - 64px));
    background:var(--win-bg);
    backdrop-filter:blur(38px) saturate(1.25);
    -webkit-backdrop-filter:blur(38px) saturate(1.25);
    border:1px solid rgba(255,255,255,.09);
    border-radius:var(--radius-win);
    box-shadow:0 26px 70px rgba(0,0,0,.45),0 4px 16px rgba(0,0,0,.30);
    display:grid;
    grid-template-columns:64px 1fr;
    grid-template-rows:46px 1fr;
    grid-template-areas:"titlebar titlebar" "sidebar main";
    overflow:hidden;
    position:relative;
  }

  /* ============ BARRA DE TÍTULO ============ */
  .titlebar{
    grid-area:titlebar;
    display:flex;align-items:center;
    padding-left:10px;
    user-select:none;
  }
  .hamburger{
    width:44px;height:34px;border-radius:var(--radius);
    display:grid;place-items:center;
    background:transparent;border:none;color:var(--text);cursor:pointer;
  }
  .hamburger:hover{background:var(--card-hover)}
  .app-id{display:flex;align-items:center;gap:10px;margin-left:8px;font-size:12.5px;color:var(--text-2)}
  .app-icon{
    width:18px;height:18px;border-radius:4px;
    background:linear-gradient(145deg,#e8c46a,#c79a3a);
    display:grid;place-items:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .app-icon svg{width:12px;height:12px;color:#5a4615}
  .caption-controls{margin-left:auto;display:flex;height:100%}
  .caption-controls button{
    width:46px;height:100%;border:none;background:transparent;color:#d8d5cd;
    display:grid;place-items:center;cursor:pointer;
  }
  .caption-controls button:hover{background:rgba(255,255,255,.08)}
  .caption-controls button.close:hover{background:#c42b1c;color:#fff}
  .caption-controls svg{width:11px;height:11px}

  /* ============ SIDEBAR ============ */
  .sidebar{
    grid-area:sidebar;
    background:var(--sidebar-bg);
    display:flex;flex-direction:column;align-items:center;
    padding:6px 0 10px;
    gap:4px;
  }
  .nav-btn{
    position:relative;
    width:48px;height:44px;border-radius:var(--radius);
    border:none;background:transparent;color:#e6e3da;cursor:pointer;
    display:grid;place-items:center;
  }
  .nav-btn svg{width:19px;height:19px}

  .nav-btn.active{background:var(--card-active)}

    content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:3px;background:var(--accent);
  }
  .sidebar .spacer{flex:1}
  .avatar{
    width:30px;height:30px;border-radius:50%;
    background:linear-gradient(140deg,#7a9bb5,#41617c);
    display:grid;place-items:center;font-size:11px;font-weight:600;color:#eef4f9;
    margin-bottom:6px;cursor:pointer;border:none;
  }

  /* ============ FLYOUT DO MENU ============ */
  .flyout{
    position:absolute;inset:0 auto 0 0;width:300px;z-index:40;
    background:rgba(28,27,25,.97);
    backdrop-filter:blur(30px);
    border-right:1px solid var(--stroke);
    border-radius:var(--radius-win) 0 0 var(--radius-win);
    padding:6px 8px 10px;
    display:flex;flex-direction:column;gap:2px;
    transform:translateX(-103%);
    transition:transform .22s cubic-bezier(.2,.7,.2,1);
  }
  .flyout.open{transform:translateX(0)}
  .flyout .top{display:flex;align-items:center;gap:8px;height:40px;margin-bottom:4px}
  .flyout-item{
    position:relative;
    display:flex;align-items:center;gap:14px;
    height:40px;padding:0 12px;border-radius:var(--radius);
    border:none;background:transparent;color:var(--text-2);
    font-size:13.5px;font-family:inherit;cursor:pointer;text-align:left;
  }
  .flyout-item svg{width:18px;height:18px;flex:none}
  .flyout-item:hover{background:var(--card-hover);color:var(--text)}
  .flyout-item.active{background:var(--card-active);color:var(--text)}
  .flyout-item.active::before{
    content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:3px;background:var(--accent);
  }
  .scrim{position:absolute;inset:0;z-index:30;display:none}
  .scrim.show{display:block}

  /* ============ ÁREA PRINCIPAL ============ */
  .main{
    grid-area:main;
    display:flex;flex-direction:column;
    min-width:0;min-height:0;
    padding:4px 26px 0;
  }

  /* trilha de navegação */
  .crumbs{
    display:flex;align-items:center;gap:2px;
    font-size:13px;color:var(--text-3);
    padding:8px 2px 2px;flex-wrap:wrap;
  }
  .crumb{
    border:none;background:transparent;color:var(--text-3);
    font:inherit;padding:4px 8px;border-radius:var(--radius);cursor:pointer;
  }
  .crumb:hover{background:var(--card-hover);color:var(--text)}
  .crumb.current{color:var(--text)}
  .crumbs svg{width:10px;height:10px;opacity:.5}

  /* cabeçalho da pasta */
  .folder-head{
    display:flex;align-items:flex-end;justify-content:space-between;
    padding:6px 2px 18px;gap:16px;flex-wrap:wrap;
  }
  .folder-title{font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;font-size:34px;font-weight:600;letter-spacing:.2px}
  .folder-sub{font-size:12.5px;color:var(--text-3);margin-top:2px}

  /* botões de comando — círculos como no cronômetro */
  .commands{display:flex;align-items:center;gap:10px}
  .cmd{
    width:46px;height:46px;border-radius:50%;
    border:none;cursor:pointer;
    background:var(--card);color:#e6e3da;
    display:grid;place-items:center;
    transition:background .12s;
    position:relative;
  }
  .cmd svg{width:18px;height:18px}
  .cmd:hover{background:var(--card-hover)}
  .cmd:disabled{opacity:.35;cursor:default}
  .cmd:disabled:hover{background:var(--card)}
  .cmd.primary{background:var(--accent);color:var(--accent-text)}
  .cmd.primary:hover{background:#d7cc97}
  .cmd.primary:active{background:var(--accent-press)}
  .cmd[data-tip]:hover::after{
    content:attr(data-tip);
    position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:#2c2b28;border:1px solid var(--stroke);
    color:var(--text-2);font-size:11.5px;white-space:nowrap;
    padding:5px 10px;border-radius:4px;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
    pointer-events:none;z-index:20;
  }

  .scroll{flex:1;overflow:auto;min-height:0;padding-bottom:80px}
  .scroll::-webkit-scrollbar{width:10px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:99px;border:3px solid transparent;background-clip:content-box}
  .scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25);background-clip:content-box}

  .section-label{font-size:12px;color:var(--text-3);font-weight:600;letter-spacing:.3px;padding:4px 2px 10px}

  /* cards de pastas — como os cards de temporizador */
  .folders{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:12px;margin-bottom:26px;
  }
  .folder-card{
    background:var(--card);
    border:1px solid transparent;
    border-radius:8px;
    padding:14px 14px 16px;
    cursor:pointer;
    display:flex;flex-direction:column;gap:14px;
    transition:background .12s,border-color .12s;
    text-align:left;color:var(--text);font-family:inherit;
  }
  .folder-card:hover{background:var(--card-hover)}
  .folder-card.selected{border-color:var(--accent);background:var(--card-active)}
  .folder-card .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .folder-card .name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .folder-card .pin{width:14px;height:14px;color:var(--text-3);flex:none}
  .folder-glyph{
    width:54px;height:54px;border-radius:50%;
    border:2px solid rgba(255,255,255,.13);
    display:grid;place-items:center;align-self:center;
    margin:4px 0;
  }
  .folder-glyph svg{width:22px;height:22px;color:var(--accent)}
  .folder-card .meta{font-size:11.5px;color:var(--text-3);text-align:center}

  /* lista de arquivos — como a tabela de voltas */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{
    text-align:left;font-weight:600;color:var(--text);
    padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.12);
    position:sticky;top:0;background:rgba(34,33,30,.9);backdrop-filter:blur(10px);
  }
  tbody td{padding:11px 10px;color:var(--text-2)}
  tbody tr{cursor:default;border-radius:var(--radius)}
  tbody tr:hover td{background:var(--card)}
  tbody tr.selected td{background:rgba(205,193,136,.12)}
  tbody tr.selected td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
  td.name-cell{display:flex;align-items:center;gap:12px;color:var(--text)}
  .file-ic{width:17px;height:17px;color:var(--accent);flex:none}
  td.size,th.size{text-align:right}
  td.size{font-variant-numeric:tabular-nums;color:var(--text-3)}

  /* barra flutuante inferior direita — como no relógio */
  .fab-group{
    position:absolute;right:22px;bottom:18px;z-index:10;
    display:flex;gap:4px;
    background:rgba(40,39,36,.92);
    border:1px solid var(--stroke);
    border-radius:8px;padding:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .fab{
    width:44px;height:38px;border-radius:5px;border:none;cursor:pointer;
    background:transparent;color:#e6e3da;display:grid;place-items:center;position:relative;
  }
  .fab svg{width:17px;height:17px}
  .fab:hover{background:var(--card-hover)}
  .fab[data-tip]:hover::after{
    content:attr(data-tip);
    position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:#2c2b28;border:1px solid var(--stroke);
    color:var(--text-2);font-size:11.5px;white-space:nowrap;
    padding:5px 10px;border-radius:4px;
  }

  /* barra de status */
  .statusbar{
    position:absolute;left:74px;bottom:0;right:0;height:30px;
    display:flex;align-items:center;gap:18px;
    padding:0 26px;font-size:11.5px;color:var(--text-3);
    background:linear-gradient(to top,rgba(24,23,21,.55),transparent);
    pointer-events:none;
  }

  @media (max-width:760px){
    body{padding:10px}
    .window{grid-template-columns:56px 1fr;height:calc(100vh - 20px)}
    .folder-title{font-size:26px}
    .main{padding:4px 14px 0}
    thead th:nth-child(3),tbody td:nth-child(3){display:none}
  }
  @media (prefers-reduced-motion:reduce){
    .flyout{transition:none}
  }
</style>

const grid = document.getElementById("folderGrid");
const rows = document.getElementById("fileRows");
const crumbsEl = document.getElementById("crumbs");
const stItems = document.getElementById("stItems");
const stSel = document.getElementById("stSel");
const cmds = ["cmdCut","cmdCopy","cmdRename","cmdDelete"].map(id=>document.getElementById(id));
let current = "inicio";

function chevron(){return '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="m4 2.5 4 3.5-4 3.5"/></svg>';}

function render(view){
  current = view;
  const d = DATA[view];
  document.getElementById("folderTitle").textContent = d.title;
  document.getElementById("lblFolders").textContent = d.label;
  document.getElementById("lblFolders").style.display = d.folders.length ? "" : "none";
  document.getElementById("folderSub").textContent =
    d.folders.length + (d.folders.length===1?" pasta":" pastas") + " · " + d.files.length + (d.files.length===1?" arquivo":" arquivos");

  crumbsEl.innerHTML = d.crumbs.map((c,i)=>{
    const cur = i===d.crumbs.length-1 ? " current":"";
    return '<button class="crumb'+cur+'">'+c+'</button>' + (cur ? "" : chevron());
  }).join("");

  grid.innerHTML = d.folders.map((f,i)=>`
    <button class="folder-card" data-i="${i}">
      <span class="row"><span class="name">${f.name}</span>${f.pin?ICONS.pin:""}</span>
      <span class="folder-glyph">${f.drive?ICONS.drive:ICONS.folder}</span>
      <span class="meta">${f.meta}</span>
    </button>`).join("");

  rows.innerHTML = d.files.map((f,i)=>`
    <tr data-i="${i}">
      <td class="name-cell">${ICONS[f.ic]}${f.name}</td>
      <td>${f.date}</td>
      <td>${f.type}</td>
      <td class="size">${f.size}</td>
    </tr>`).join("");

  stItems.textContent = (d.folders.length + d.files.length) + " itens";
  updateSelection();
}

function updateSelection(){
  const n = document.querySelectorAll(".folder-card.selected, tbody tr.selected").length;
  stSel.textContent = n ? n + (n===1?" item selecionado":" itens selecionados") : "";
  cmds.forEach(b=>b.disabled = n===0);
}

grid.addEventListener("click", e=>{
  const card = e.target.closest(".folder-card");
  if(!card) return;
  card.classList.toggle("selected");
  updateSelection();
});
rows.addEventListener("click", e=>{
  const tr = e.target.closest("tr");
  if(!tr) return;
  if(!e.ctrlKey) document.querySelectorAll("tbody tr.selected").forEach(r=>r!==tr&&r.classList.remove("selected"));
  tr.classList.toggle("selected");
  updateSelection();
});

function setView(view){
  document.querySelectorAll("[data-view]").forEach(b=>b.classList.toggle("active", b.dataset.view===view));
  render(view);
  closeMenu();
}
document.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));

/* flyout */
const flyout = document.getElementById("flyout");
const scrim = document.getElementById("scrim");
function openMenu(){flyout.classList.add("open");scrim.classList.add("show");flyout.setAttribute("aria-hidden","false");}
function closeMenu(){flyout.classList.remove("open");scrim.classList.remove("show");flyout.setAttribute("aria-hidden","true");}
document.getElementById("btnMenu").addEventListener("click", openMenu);
document.getElementById("btnMenuClose").addEventListener("click", closeMenu);
scrim.addEventListener("click", closeMenu);
document.addEventListener("keydown", e=>{if(e.key==="Escape") closeMenu();});

render("inicio");
</script>
